# release.yml
#
# Builds cross-platform audit-report binaries and publishes a Homebrew
# formula to tenaciousdlg/homebrew-tap, triggered by pushing a `v*` tag
# (see .goreleaser.yaml for what actually gets built).
#
# REQUIRED SECRET: HOMEBREW_TAP_DEPLOY_KEY — an unencrypted SSH private key
# whose matching public key is added as a write-enabled deploy key on
# tenaciousdlg/homebrew-tap only (Settings → Deploy keys on that repo,
# "Allow write access" checked). This pushes over plain git+SSH, not the
# GitHub API — no token needed, and the key can't touch anything on the
# account except that one repo's git contents.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Write homebrew-tap deploy key
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/tap_deploy_key"
          printf '%s\n' "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > "$RUNNER_TEMP/tap_deploy_key"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_DEPLOY_KEY_PATH: ${{ runner.temp }}/tap_deploy_key
